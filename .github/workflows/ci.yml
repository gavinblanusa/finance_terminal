name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  openbb-doc-registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify OPENBB_COVERAGE.md matches provider registry
        run: python scripts/verify_openbb_coverage_doc.py

  test:
    runs-on: ubuntu-latest
    needs: openbb-doc-registry
    strategy:
      fail-fast: false
      matrix:
        use_openbb: ["true", "false"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pytest
        env:
          USE_OPENBB: ${{ matrix.use_openbb }}
        run: pytest tests/ -q
